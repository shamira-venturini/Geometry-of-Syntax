experiment:
  dataset_mode: corpora
  seed: 13
  output_dir: behavioral_results/experiment-4/default_run
  # Keep 1B design: same prime conditions + target materials; only DV changes.
  prime_conditions:
    - active
    - passive
    - filler
    - no_prime
  max_items_per_corpus: 2080
  filler_mode: pool
  filler_seed: 13
  filler_offset: 137
  verb_list_path: corpora/transitive/vocabulary_lists/verblist_T_usf_freq.csv
  association_csv_path: corpora/transitive/usf_association_edges_core_vocab.csv
  question_template: "Who did the {nominalized_verb}?"
  answer_prefix: "The"
  max_new_tokens: 10
  ceiling_threshold: 0.95
  # Optional overrides for irregular nominalizations.
  nominalization_overrides:
    be: being
    do: doing
    have: having
    lie: lying
    die: dying
    tie: tying
  corpora:
    - name: lexically_controlled
      path: corpora/transitive/CORE_transitive_constrained_counterbalanced_lexically_controlled.csv
      lexicality_condition: real
    - name: jabberwocky
      path: corpora/transitive/jabberwocky_transitive_bpe_filtered_2080.csv
      lexicality_condition: nonce

models:
  - name: gpt2-large
    model_condition: gpt2_large
    device: cuda
    torch_dtype: float16
    batch_size: 8
    max_length: 1024
    local_files_only: false
    use_chat_template: false
    prompt_style: plain
  - name: meta-llama/Llama-3.2-3B-Instruct
    model_condition: llama32_3b_instruct
    device: cuda
    torch_dtype: float16
    batch_size: 2
    max_length: 1024
    local_files_only: false
    use_chat_template: false
    prompt_style: plain
